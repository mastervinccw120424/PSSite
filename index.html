<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>18th — Jonalyn Atienza</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Background hearts and music are injected/managed by JS -->
  <div id="app" class="page fade-in">
    <section class="hero-section center-page">
      <div class="hero-card">
        <div class="age">18th</div>
        <img class="profile" src="images/profile.jpg" alt="Jonalyn Atienza">
        <div class="name">Jonalyn Atienza</div>
      </div>
    </section>

    <section class="journey-section">
      <header class="title">Journey</header>
      <main class="gallery" role="main">
        <div class="grid">
          <div class="card"><img src="images/image1.jpg" alt="Image 1"></div>
          <div class="card"><img src="images/image2.jpg" alt="Image 2"></div>
          <div class="card"><img src="images/image3.jpg" alt="Image 3"></div>
          <div class="card"><img src="images/image4.jpg" alt="Image 4"></div>
          <div class="card"><img src="images/image5.jpg" alt="Image 5"></div>
          <div class="card"><img src="images/image6.jpg" alt="Image 6"></div>
        </div>
      </main>
    </section>
  </div>

  <audio id="bg-music" src="music/romantic.mp3" autoplay loop preload="auto"></audio>

  <script src="js/hearts.js"></script>
  <script src="js/transition.js"></script>
</body>
</html>
